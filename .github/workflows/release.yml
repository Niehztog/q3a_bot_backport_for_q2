name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build
        run: make

      - name: Package artifacts
        run: |
          mkdir -p package/gladiator
          cp release/game/game.so   package/gladiator/
          cp release/botlib/botlib.so package/gladiator/
          cp -r botfiles             package/gladiator/
          mkdir -p package/bspc
          cp release/bspc/bspc      package/bspc/
          tar -czf q3a-bot-backport-linux-x86_64.tar.gz -C package .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: q3a-bot-backport-linux-x86_64.tar.gz

  build-windows:
    name: Build (Windows ${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            msystem: MINGW64
            pkg_prefix: mingw-w64-x86_64
          - arch: x86
            msystem: MINGW32
            pkg_prefix: mingw-w64-i686
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.pkg_prefix }}-gcc
            make

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/gladiator | Out-Null
          Copy-Item release/game/game.dll       package/gladiator/
          Copy-Item release/botlib/botlib.dll   package/gladiator/
          Copy-Item botfiles                    package/gladiator/ -Recurse
          New-Item -ItemType Directory -Force -Path package/bspc | Out-Null
          Copy-Item release/bspc/bspc.exe       package/bspc/
          Compress-Archive -Path package/* -DestinationPath q3a-bot-backport-windows-${{ matrix.arch }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: q3a-bot-backport-windows-${{ matrix.arch }}.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/linux-x86_64/q3a-bot-backport-linux-x86_64.tar.gz \
            artifacts/windows-x86_64/q3a-bot-backport-windows-x86_64.zip \
            artifacts/windows-x86/q3a-bot-backport-windows-x86.zip \
            --repo "${{ github.repository }}" \
            --title "Q3A Bot Backport for Quake II ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
